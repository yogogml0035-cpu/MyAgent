.pixel-bg-overlay {
  position: absolute; inset: 0; z-index: 1;
  background: rgba(13, 17, 23, 0.75);
}
.pixel-bg-grid {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 32px 32px;
}

/* Progress HUD */
.progress-hud {
  position: relative; z-index: 10;
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 20px;
  background: linear-gradient(180deg, rgba(20,24,36,0.95), rgba(20,24,36,0.85));
  border-bottom: 2px solid rgba(74,158,255,0.2);
}
.hud-left { display: flex; align-items: center; gap: 12px; }
.hud-title { font-size: 13px; color: #fff; white-space: nowrap; }
.hud-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }
.hud-bar-container { display: flex; align-items: center; gap: 8px; }
.hud-bar {
  width: 120px; height: 8px; background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 1px; overflow: hidden;
}
.hud-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #27c93f, #4ade80);
  transition: width 0.6s ease;
}
.hud-count { font-size: 11px; color: #eee; }
.hud-right { display: flex; align-items: center; gap: 16px; }
.hud-phase { font-size: 11px; color: #eee; }
.hud-meta { font-size: 10px; color: #ccc; }

/* Main Content */
.game-main {
  position: relative; z-index: 5;
  flex: 1; display: flex; gap: 12px;
  padding: 12px 16px; min-height: 0;
}

/* Workstation Grid */
.game-floor {
  flex: 1; display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 8px; min-height: 0;
}

/* Workstation Card */
.workstation {
  background: rgba(20, 24, 36, 0.8);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px; display: flex; flex-direction: column;
  cursor: pointer; transition: all 0.2s ease;
  overflow: hidden; position: relative;
}
.workstation:hover {
  background: rgba(30, 36, 52, 0.9);
  border-color: rgba(255,255,255,0.12);
  transform: translateY(-1px);
}
.workstation-selected { border-color: rgba(74,158,255,0.5) !important; box-shadow: 0 0 20px rgba(74,158,255,0.15); }
.workstation-active { border-color: rgba(74,158,255,0.25); }
.workstation-passed { border-color: rgba(74,222,128,0.15); }
.workstation-failed { border-color: rgba(248,113,113,0.15); }

/* Scene */
.ws-scene {
  display: flex; align-items: flex-end; justify-content: center;
  gap: 6px; padding: 8px 12px 4px; flex: 1; min-height: 0;
}

/* Character */
.game-char-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; }
.game-char-walking { animation: char-walk-move 3s ease-in-out infinite; }
@keyframes char-walk-move {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(8px) translateY(-2px); }
  50% { transform: translateX(16px); }
  75% { transform: translateX(8px) translateY(2px); }
}
.char-indicator, .char-accessory { position: absolute; font-family: sans-serif; pointer-events: none; }
.char-indicator { top: -8px; right: -4px; font-size: 12px; animation: indicator-bounce 1.2s ease-in-out infinite; }
.char-accessory { top: 4px; right: -16px; font-size: 12px; }
.char-ind-active { color: #4a9eff; }
.char-ind-pass { color: #fbbf24; }
.char-ind-fail { color: #f87171; font-size: 14px; font-weight: bold; }
.char-ind-block { font-size: 10px; }
.char-ind-sleep {
  color: #9ca3af; font-style: italic; font-size: 14px;
  font-family: 'Press Start 2P', monospace;
  animation: zzz-float 2s ease-in-out infinite;
}
.char-coffee { animation: coffee-bob 2s ease-in-out infinite; }
.char-music { color: #4a9eff; font-size: 10px; animation: music-float 1s ease-in-out infinite; }

@keyframes indicator-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
@keyframes zzz-float {
  0% { transform: translateY(0) translateX(0); opacity: 0.3; font-size: 10px; }
  50% { transform: translateY(-10px) translateX(4px); opacity: 1; font-size: 14px; }
  100% { transform: translateY(-18px) translateX(8px); opacity: 0; font-size: 10px; }
}
@keyframes coffee-bob { 0%, 100% { transform: translateY(0) rotate(0deg); } 30% { transform: translateY(-6px) rotate(-10deg); } 60% { transform: translateY(-4px) rotate(-5deg); } }
@keyframes music-float { 0%, 100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-6px); opacity: 1; } }

/* Desk Monitor */
.desk-monitor-area { display: flex; flex-direction: column; align-items: center; }
.desk-monitor {
  width: 44px; height: 34px; background: #2a2a3e; border: 2px solid #4a4a6e;
  border-radius: 3px; display: flex; align-items: center; justify-content: center;
  transition: box-shadow 0.3s;
}
.desk-screen {
  width: 34px; height: 24px; border-radius: 1px;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.screen-code { display: flex; flex-direction: column; gap: 3px; padding: 4px; width: 100%; }
.code-line { height: 2px; background: #4a9eff; border-radius: 1px; animation: code-type 1.5s ease-in-out infinite; }
.code-line.short { width: 60%; }
@keyframes code-type { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
.screen-icon { font-size: 14px; font-family: sans-serif; }
.screen-check { color: #4ade80; }
.screen-x { color: #f87171; }

const FALLBACK = {

  ],

- 定义了 Note 接口类型
- 创建了示例数据文件，包含 2 条示例笔记
- 将 page.tsx 改为 "use client" 客户端组件
- 应用初始化后默认选中第一条示例笔记
- TypeScript 类型检查和 next build 均通过

  - 类型定义放在 app/types.ts，示例数据放在 app/sample-data.ts`,
  runtime: { iteration: 12, max_iterations: 50, phase: "developing", current_story: "US-003", elapsed: 340 }
};

const POLL_MS = 2000;

function cloneFallback() {
  return JSON.parse(JSON.stringify(FALLBACK));
}

let useFallback = false;
let dashboardData = cloneFallback();

// ═══════ SPRITES ═══════
const SPRITES = {
  typing1: ["..hhhhhh..","hhhhhhhh.",".hsssssh.",".seesseeh.","..ssssss..","..ssmms...","...tttt...","..tttttt..",".stttttts.","..tttttt..","...pppp...","...p..p...","...p..p...","...bb.bb.."],
  typing2: ["..hhhhhh..",".hhhhhhhh.","..ssssss..",".seesseeh.","..ssssss..","..ssmms...","...tttt...","..tttttt..","stttttttts","..tttttt..","...pppp...","...p..p...","...p..p...","...bb.bb.."],
  idle: ["..hhhhhh..",".hhhhhhhh.","..ssssss..","..seesse..","..ssssss..","..ssmms...","...tttt...","..tttttt..",".stttttts.","..tttttt..","...pppp...","...p..p...","...p..p...","...bb.bb.."],
  celebrate1: ["s..hhhh..s","s.hhhhhh.s","..ssssss..","..seesse..","..ssssss..","...smms...","s..tttt..s",".s.tttt.s.","..tttttt..","..tttttt..","...pppp...","...p..p...","..pp..pp..","..bb..bb.."],
  celebrate2: [".s.hhhh.s.","..hhhhhh..","..ssssss..","..seesse..","..ssssss..","...smms...",".s.tttt.s.","s..tttt..s","..tttttt..","..tttttt..","...pppp...","...p..p...","..pp..pp..","..bb..bb.."],
  sleeping: ["..........","..hhhhhh..",".hhhhhhhh.","..hhhhhh..","..ssssss..","..ssssss..","...tttt...","..tttttt..","..tttttt..","..tttttt..","...pppp...","...p..p...","...p..p...","...bb.bb.."],
  frustrated: ["..hhhhhh..",".hhhhhhhh.","..ssssss..","..seesse..","..ssssss..","..ssssss..","s..tttt..s",".ssttttss.","..tttttt..","..tttttt..","...pppp...","...p..p...","...p..p...","...bb.bb.."],
  walk1: ["..hhhhhh..",".hhhhhhhh.","..ssssss..","..seesse..","..ssssss..","..ssmms...","...tttt...","..tttttt..",".stttttts.","..tttttt..","...pppp...","..pp..p...","..p..pp...","..bb..bb.."],
  walk2: ["..hhhhhh..",".hhhhhhhh.","..ssssss..","..seesse..","..ssssss..","..ssmms...","...tttt...","..tttttt..",".stttttts.","..tttttt..","...pppp...","...p..pp..","...pp..p..","..bb..bb.."],
  coffee: ["..hhhhhh..",".hhhhhhhh.","..ssssss..","..seesse..","..ssssss..","..ssmms...","...tttt...","..tttttt..","..tttttts.","..tttttt..","...pppp...","...p..p...","...p..p...","...bb.bb.."],
};

const PALETTES = [
  { h:"#2c3e50",s:"#f4c99b",e:"#1a1a2e",m:"#d4956b",t:"#e74c3c",p:"#34495e",b:"#1a1a2e" },
  { h:"#8b4513",s:"#e8b88a",e:"#1a1a2e",m:"#c08060",t:"#3498db",p:"#2c3e50",b:"#222" },
  { h:"#d4a017",s:"#c68c5c",e:"#1a1a2e",m:"#a06040",t:"#2ecc71",p:"#34495e",b:"#1a1a2e" },
  { h:"#c0392b",s:"#f0d0a0",e:"#1a1a2e",m:"#d0a080",t:"#f39c12",p:"#2c3e50",b:"#222" },
  { h:"#1a1a2e",s:"#a0704a",e:"#0d0d15",m:"#805030",t:"#9b59b6",p:"#34495e",b:"#111" },
  { h:"#654321",s:"#d4a574",e:"#1a1a2e",m:"#b08050",t:"#1abc9c",p:"#2c3e50",b:"#1a1a2e" },
  { h:"#f4a460",s:"#f4c99b",e:"#1a1a2e",m:"#d4956b",t:"#e67e22",p:"#34495e",b:"#222" },
  { h:"#2d1b00",s:"#c9956b",e:"#1a1a2e",m:"#a07050",t:"#34495e",p:"#2c3e50",b:"#111" },
  { h:"#4a4a4a",s:"#deb887",e:"#1a1a2e",m:"#be9870",t:"#e84393",p:"#34495e",b:"#1a1a2e" },
];

const PIXEL_SCALE = 5;

function spriteToBoxShadow(rows, palette) {
  const shadows = [];
  for (let y = 0; y < rows.length; y++)
    for (let x = 0; x < rows[y].length; x++) {
      const ch = rows[y][x];
      if (ch !== '.' && palette[ch]) shadows.push(`${x}px ${y}px 0 0 ${palette[ch]}`);
    }
  return shadows.join(',');
}

// ═══════ STATE ═══════
let selectedStory = null;
const charStates = {}; // per-character animation state

function getStories() {
  return dashboardData.stories || [];
}

function getRuntime() {
  return dashboardData.runtime || FALLBACK.runtime;
}

function getStoryState(story) {
  const runtime = getRuntime();
  if (story.id === runtime.current_story) return 'active';
  if (story.blocked) return 'blocked';
  if (story.passes === true) return 'passed';
  if (story.passes === false && (story.retryCount > 0 || story.notes)) return 'failed';
  return 'pending';
}

function formatElapsed(sec) {
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec/60) + 'm ' + (sec%60) + 's';
  return Math.floor(sec/3600) + 'h ' + Math.floor((sec%3600)/60) + 'm';
}

const stateLabel = { active:'进行中', passed:'已通过', failed:'未通过', blocked:'已阻塞', pending:'待执行' };
const stateColor = { active:'#4a9eff', passed:'#4ade80', failed:'#f87171', blocked:'#fb923c', pending:'#6b7280' };
const phaseEmoji = { idle:'⏸', developing:'🤖', validating:'🔍', done:'✅', error:'❌' };
const phaseText = { idle:'等待启动', developing:'开发中', validating:'验证中', done:'全部完成', error:'出现错误' };

// ═══════ CHARACTER ANIMATION ═══════
const IDLE_ACTIONS = ['coffee','stretch','walk'];

function ensureCharStates() {
  getStories().forEach((story) => {
    if (!charStates[story.id]) {
      charStates[story.id] = {
        frame: 0,
        idleAction: null,
        idleScheduled: false,
        spriteKey: 'idle',
        shadowCache: {},
      };
    }
  });
}

function updateCharacter(story, index) {
  const cs = charStates[story.id];
  const state = getStoryState(story);

  // Determine sprite
  let spriteKey;
  if (cs.idleAction === 'coffee') spriteKey = 'coffee';
  else if (cs.idleAction === 'walk') spriteKey = cs.frame === 0 ? 'walk1' : 'walk2';
  else if (cs.idleAction === 'stretch') spriteKey = cs.frame === 0 ? 'celebrate1' : 'celebrate2';
  else {
    switch(state) {
      case 'active': spriteKey = cs.frame === 0 ? 'typing1' : 'typing2'; break;
      case 'passed': spriteKey = cs.frame === 0 ? 'celebrate1' : 'celebrate2'; break;
      case 'failed': case 'blocked': spriteKey = 'frustrated'; break;
      case 'pending': spriteKey = 'sleeping'; break;
      default: spriteKey = 'idle';
    }
  }
  cs.spriteKey = spriteKey;

  // Cache box-shadow
  const cacheKey = spriteKey + '_' + index;
  if (!cs.shadowCache[cacheKey]) {
    cs.shadowCache[cacheKey] = spriteToBoxShadow(SPRITES[spriteKey] || SPRITES.idle, PALETTES[index % PALETTES.length]);
  }
  return cs;
}

// Frame toggle
setInterval(() => {
  ensureCharStates();
  getStories().forEach((story) => {
    charStates[story.id].frame = (charStates[story.id].frame + 1) % 2;
  });
  render();
}, 500);

function scheduleIdleActions() {
  getStories().forEach((story, index) => {
    const cs = charStates[story.id];
    if (!cs || cs.idleScheduled) return;
    cs.idleScheduled = true;

    function triggerIdle() {
      const currentStory = getStories().find((item) => item.id === story.id);
      if (!currentStory || !charStates[story.id]) return;

      const state = getStoryState(currentStory);
      if (state === 'active' || state === 'blocked') return;
      if (Math.random() < 0.35) {
        const action = IDLE_ACTIONS[Math.floor(Math.random() * IDLE_ACTIONS.length)];
        charStates[story.id].idleAction = action;
        setTimeout(() => {
          if (charStates[story.id]) {
            charStates[story.id].idleAction = null;
            render();
          }
        }, 2500 + Math.random() * 2000);
        render();
      }
    }

    setTimeout(triggerIdle, 2000 + index * 800);
    setInterval(triggerIdle, 5000 + Math.random() * 4000);
  });
}

// Elapsed timer
setInterval(() => {
  if (useFallback) {
    dashboardData.runtime.elapsed++;
  }
  render();
}, 1000);

async function poll() {
  if (!useFallback) {
    try {
      const res = await fetch('/api/state');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      dashboardData = await res.json();
    } catch (e) {
      useFallback = true;
      dashboardData = cloneFallback();
    }
  }

  ensureCharStates();
  scheduleIdleActions();
  render();
}

// ═══════ RENDER ═══════
function render() {
  ensureCharStates();
  const stories = getStories();
  const runtime = getRuntime();
  const passedCount = stories.filter(s => s.passes === true).length;
  const pct = stories.length ? Math.round((passedCount / stories.length) * 100) : 0;
  const isActive = runtime.phase === 'developing' || runtime.phase === 'validating';

  let html = '';

  // HUD
  html += `<div class="progress-hud">
    <div class="hud-left">
      <span class="hud-title">🏢 干活进度</span>
      <div class="hud-divider"></div>
      <div class="hud-bar-container">
        <div class="hud-bar"><div class="hud-bar-fill" style="width:${pct}%"></div></div>
        <span class="hud-count">${passedCount}/${stories.length}</span>
      </div>
    </div>
    <div class="hud-right">
      <span class="hud-phase">${phaseEmoji[runtime.phase]||'⏸'} ${phaseText[runtime.phase]||'等待启动'}${runtime.current_story ? ' · '+runtime.current_story : ''}${isActive ? '<span class="loading-dots"></span>' : ''}</span>
      <span class="hud-meta">Round ${runtime.iteration}/${runtime.max_iterations} · ${formatElapsed(runtime.elapsed)}</span>
    </div>
  </div>`;

  // Main
  html += '<div class="game-main"><div class="game-floor">';
  stories.forEach((story, i) => {
    const state = getStoryState(story);
    const cs = updateCharacter(story, i);
    const isSel = selectedStory === story.id;
    const cacheKey = cs.spriteKey + '_' + i;

    const screenColor = state==='active'?'#1a3a5e':state==='passed'?'#1a3e1a':state==='failed'?'#3e1a1a':state==='blocked'?'#3e2e1a':'#1a1a1a';
    const glowColor = state==='active'?'rgba(74,158,255,0.4)':state==='passed'?'rgba(74,222,128,0.3)':state==='failed'?'rgba(248,113,113,0.3)':state==='blocked'?'rgba(251,146,60,0.3)':'rgba(100,100,100,0.1)';

    let screenInner = '';
    if (state==='active') screenInner='<div class="screen-code"><span class="code-line"></span><span class="code-line short"></span><span class="code-line"></span></div>';
    else if (state==='passed') screenInner='<span class="screen-icon screen-check">✓</span>';
    else if (state==='failed') screenInner='<span class="screen-icon screen-x">✗</span>';
    else if (state==='blocked') screenInner='<span class="screen-icon screen-warn">⚠</span>';
    else screenInner='<span class="screen-icon screen-off">—</span>';

    let indicators = '';
    if (cs.idleAction==='coffee') indicators='<div class="char-accessory char-coffee">☕</div>';
    else if (cs.idleAction==='walk') indicators='<div class="char-accessory char-music">♪</div>';
    else if (state==='active') indicators='<div class="char-indicator char-ind-active">⚡</div>';
    else if (state==='passed') indicators='<div class="char-indicator char-ind-pass">★</div>';
    else if (state==='failed') indicators='<div class="char-indicator char-ind-fail">!</div>';
    else if (state==='blocked') indicators='<div class="char-indicator char-ind-block">🔒</div>';
    else if (state==='pending' && !cs.idleAction) indicators='<div class="char-indicator char-ind-sleep">z</div>';

    let detail = '';
    if (isSel) {
      detail = `<div class="ws-detail" onclick="event.stopPropagation()">
        <div class="ws-detail-title">${story.title}</div>
        <div class="ws-detail-desc">${story.description}</div>
        ${story.notes ? '<div class="ws-detail-notes">⚠ '+story.notes+'</div>' : ''}
        ${story.retryCount > 0 ? '<div class="ws-detail-retry">重试 ×'+story.retryCount+'</div>' : ''}
        <div class="ws-detail-criteria">${story.acceptanceCriteria.map(c=>'<div class="ws-detail-criterion">• '+c+'</div>').join('')}</div>
      </div>`;
    }

    html += `<div class="workstation ${isSel?'workstation-selected':''} workstation-${state}" data-id="${story.id}" onclick="event.stopPropagation();toggleStory('${story.id}')">
      <div class="ws-scene">
        <div class="game-char-wrapper ${cs.idleAction==='walk'?'game-char-walking':''}">
          <div style="width:${10*PIXEL_SCALE}px;height:${14*PIXEL_SCALE}px;position:relative;image-rendering:pixelated">
            <div style="position:absolute;top:0;left:0;width:1px;height:1px;box-shadow:${cs.shadowCache[cacheKey]};transform:scale(${PIXEL_SCALE});transform-origin:top left"></div>
          </div>
          ${indicators}
        </div>
        <div class="desk-monitor-area">
          <div class="desk-monitor" style="box-shadow:0 0 12px ${glowColor}">
            <div class="desk-screen" style="background:${screenColor}">${screenInner}</div>
          </div>
          <div class="desk-stand"></div>
          <div class="desk-surface"></div>
        </div>
      </div>
      <div class="ws-info">
        <div class="ws-header">
          <span class="ws-id">${story.id}</span>
          <span class="ws-status" style="color:${stateColor[state]};border-color:${stateColor[state]}">${stateLabel[state]}</span>
        </div>
        <div class="ws-title">${story.title}</div>
        ${story.notes ? '<div class="ws-notes">⚠ '+story.notes+'</div>' : ''}
      </div>
      ${detail}
    </div>`;
  });
  html += '</div>';

  // Log Terminal
  const sections = (dashboardData.logs || '').split(/(?=^## )/m).filter(s => s.trim());
  html += '<div class="log-terminal"><div class="log-header"><span class="log-title">📋 Progress Log</span></div><div class="log-body">';
  sections.forEach((sec, i) => {
    const lines = sec.split('\n');
    const header = lines[0].replace(/^## /, '').trim();
    const body = lines.slice(1).join('\n').trim();
    const isLatest = i === sections.length - 1;
    const bodyHtml = body.replace(/\*\*(.*?)\*\*/g, '<span class="log-bold">$1</span>');
    html += `<div class="log-section ${isLatest?'log-latest':''}">
      <div class="log-sec-header">${header}</div>
      <div class="log-sec-body">${bodyHtml}</div>
    </div>`;
  });
  html += '</div></div></div>';

  // Status bar
  html += `<div class="game-status-bar">
    <span>🏢 ${dashboardData.project || ''}</span>
    <span>⎇ ${dashboardData.branchName || ''}</span>
    <span>${new Date().toLocaleTimeString('zh-CN')}</span>
  </div>`;

  document.getElementById('app').innerHTML = html;

  // Auto-scroll log
  const logBody = document.querySelector('.log-body');
  if (logBody) logBody.scrollTop = logBody.scrollHeight;
}

function toggleStory(id) {
  selectedStory = selectedStory === id ? null : id;
  render();
}

document.getElementById('app').addEventListener('click', () => {
  selectedStory = null;
  render();
});

setInterval(poll, POLL_MS);
poll();
</script>
</body>
</html>
