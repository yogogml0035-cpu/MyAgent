<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ralph — 干活进度</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: hsl(240 5% 96%);
    --fg: hsl(0 0% 13%);
    --card: hsl(0 0% 100%);
    --border: hsl(0 0% 88%);
    --secondary: hsl(240 4% 91%);
    --muted: hsl(0 0% 45%);
    --mac-green: hsl(142 71% 45%);
    --mac-red: hsl(4 90% 58%);
    --mac-orange: hsl(36 100% 50%);
    --mac-blue: hsl(211 100% 50%);
    --mac-purple: hsl(280 68% 60%);
    --mac-gray: hsl(0 0% 72%);
    --mac-tint: hsl(211 100% 96%);
    --glass-bg: hsla(0, 0%, 100%, 0.72);
    --glass-border: hsla(0, 0%, 100%, 0.5);
    --glass-shadow: 0 2px 20px rgba(0,0,0,0.06), 0 0 1px rgba(0,0,0,0.1);
    --glass-shadow-lg: 0 8px 40px rgba(0,0,0,0.08), 0 0 1px rgba(0,0,0,0.12);
    --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --font-mono: 'SF Mono', Menlo, Monaco, 'Cascadia Code', Consolas, monospace;
  }

  html, body { height: 100%; font-family: var(--font-sans); color: var(--fg); -webkit-font-smoothing: antialiased; }

  body {
    background:
      radial-gradient(ellipse at 20% 50%, hsla(211,100%,95%,0.6) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, hsla(280,70%,95%,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, hsla(142,60%,95%,0.3) 0%, transparent 50%),
      var(--bg);
  }

  .glass {
    background: var(--glass-bg);
    backdrop-filter: blur(20px) saturate(1.8);
    -webkit-backdrop-filter: blur(20px) saturate(1.8);
    border: 0.5px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
  }
  .glass-lg {
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(1.8);
    -webkit-backdrop-filter: blur(24px) saturate(1.8);
    border: 0.5px solid var(--glass-border);
    box-shadow: var(--glass-shadow-lg);
  }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .topbar {
    display: flex; align-items: center; gap: 20px;
    padding: 12px 20px; margin: 12px 16px 0; border-radius: 12px;
  }
  .topbar .title { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; flex-shrink: 0; }
  .topbar .sep { width: 1px; height: 16px; background: var(--border); }
  .progress-wrap { flex: 1; display: flex; align-items: center; gap: 12px; }
  .progress-bar { flex: 1; height: 5px; background: var(--secondary); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--mac-blue); border-radius: 99px; transition: width 0.7s ease-out; }
  .progress-label { font-size: 12px; color: var(--muted); font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .topbar .meta { display: flex; gap: 12px; font-size: 11px; color: var(--muted); font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .refresh-button {
    border: 0; border-radius: 8px; padding: 7px 10px;
    background: var(--secondary); color: var(--fg);
    font: 600 12px var(--font-sans); cursor: pointer;
    white-space: nowrap;
  }
  .refresh-button:hover { background: hsl(240 4% 86%); }
  .refresh-button:disabled { cursor: wait; opacity: 0.65; }
  .detail-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .main { flex: 1; display: flex; gap: 12px; padding: 12px 16px; overflow: hidden; min-height: 0; }
  .stories-panel { width: 340px; flex-shrink: 0; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
  .stories-panel .panel-title { padding: 12px 16px 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); font-weight: 500; }
  .stories-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
  .logs-panel { flex: 1; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
  .logs-panel .panel-title { padding: 12px 16px 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); font-weight: 500; }
  .logs-content { flex: 1; overflow-y: auto; padding: 0 16px 16px; }

  .bottombar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 20px; margin: 0 16px 12px; border-radius: 12px;
  }
  .phase { display: flex; align-items: center; gap: 8px; }
  .phase-dot { width: 7px; height: 7px; border-radius: 50%; }
  .phase-text { font-size: 12px; color: var(--muted); }
  .clock { font-size: 11px; color: var(--muted); font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

  /* Story Card */
  .story-card {
    padding: 12px; margin-bottom: 8px; border-radius: 12px;
    transition: all 0.2s; cursor: pointer;
  }
  .story-card:hover { background: hsla(0,0%,100%,0.4); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .story-card:focus-visible { outline: 2px solid var(--mac-blue); outline-offset: 2px; }
  .story-card.active { box-shadow: var(--glass-shadow-lg); border: 0.5px solid var(--glass-border); background: var(--glass-bg); }
  .story-card.pending { opacity: 0.5; }
  .story-card .row { display: flex; align-items: flex-start; gap: 10px; }
  .story-card .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .story-card .info { flex: 1; min-width: 0; }
  .story-card .header { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
  .story-card .id { font-size: 11px; font-family: var(--font-mono); color: var(--muted); font-weight: 500; }
  .story-card .badge {
    font-size: 10px; padding: 1px 6px; border-radius: 6px; font-weight: 500;
  }
  .story-card .retry { font-size: 10px; font-family: var(--font-mono); color: var(--mac-red); }
  .story-card .card-title { font-size: 13px; line-height: 1.4; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .story-card .notes { margin-top: 4px; font-size: 11px; color: hsla(4,90%,58%,0.8); line-height: 1.4; }

  /* Log section */
  .log-section { margin-bottom: 12px; border-radius: 12px; overflow: hidden; }
  .log-header { padding: 8px 16px; font-size: 12px; font-weight: 600; border-bottom: 0.5px solid hsla(0,0%,88%,0.5); }
  .log-header.latest { color: var(--mac-blue); }
  .log-body { padding: 12px 16px; font-size: 12px; line-height: 1.7; color: var(--muted); font-family: var(--font-mono); white-space: pre-wrap; word-break: break-word; }
  .log-body strong { color: var(--fg); font-weight: 600; }

  /* Story detail */
  .app.detail-mode .topbar,
  .app.detail-mode .main,
  .app.detail-mode .bottombar { display: none; }
  .detail-view[hidden] { display: none !important; }
  .detail-view {
    height: 100vh; margin: 12px 16px; border-radius: 12px;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .detail-top {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 16px; border-bottom: 0.5px solid hsla(0,0%,88%,0.65);
  }
  .back-button {
    border: 0; border-radius: 8px; padding: 7px 10px;
    background: var(--secondary); color: var(--fg);
    font: 600 12px var(--font-sans); cursor: pointer;
    white-space: nowrap;
  }
  .back-button:hover { background: hsl(240 4% 86%); }
  .detail-heading { min-width: 0; flex: 1; }
  .detail-kicker { font-size: 11px; color: var(--muted); font-family: var(--font-mono); margin-bottom: 2px; }
  .detail-title { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rounds { flex: 1; overflow-y: auto; padding: 14px 16px 18px; }
  .empty-detail {
    height: 100%; display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 13px; font-style: italic;
  }
  .round-card {
    margin-bottom: 10px; border-radius: 10px; overflow: hidden;
    border: 0.5px solid hsla(0,0%,88%,0.65);
  }
  .round-toggle {
    width: 100%; border: 0; background: transparent; color: var(--fg);
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 11px 14px; cursor: pointer; text-align: left;
    font: 600 12px var(--font-sans);
  }
  .round-toggle:hover { background: hsla(0,0%,100%,0.35); }
  .round-meta { color: var(--muted); font: 500 11px var(--font-mono); white-space: nowrap; }
  .round-body { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 10px; padding: 0 12px 12px; }
  .log-pane {
    min-width: 0; border-radius: 8px; overflow: hidden;
    background: hsla(0,0%,100%,0.52); border: 0.5px solid hsla(0,0%,88%,0.65);
  }
  .log-pane-head {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 8px 10px; border-bottom: 0.5px solid hsla(0,0%,88%,0.65);
    font-size: 11px; font-weight: 600;
  }
  .log-path {
    color: var(--muted); font-family: var(--font-mono); font-size: 10px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .detail-log {
    max-height: 58vh; overflow: auto; padding: 10px;
    color: hsl(0 0% 21%); font: 11px/1.65 var(--font-mono);
    white-space: pre-wrap; word-break: break-word;
  }
  .detail-log.empty { color: var(--muted); font-style: italic; }

  /* Animations */
  @keyframes breathe {
    0%, 100% { opacity: 0.4; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }
  .breathe { animation: breathe 2s ease-in-out infinite; }

  @keyframes mac-pulse {
    0%, 100% { box-shadow: 0 0 0 0 hsla(211,100%,50%,0.3); }
    50% { box-shadow: 0 0 0 6px hsla(211,100%,50%,0); }
  }
  .active-pulse { animation: mac-pulse 2s ease-in-out infinite; }

  @keyframes loading-dots {
    0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; }
  }
  .loading-dots::after { content: ''; animation: loading-dots 1.5s steps(4, end) infinite; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: hsla(0,0%,0%,0.15); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: hsla(0,0%,0%,0.3); }

  @media (max-width: 800px) {
    .main { flex-direction: column; }
    .stories-panel { width: 100%; max-height: 40vh; }
    .detail-view { margin: 0; border-radius: 0; }
    .detail-top { align-items: flex-start; }
    .detail-actions { flex-wrap: wrap; }
    .detail-title { white-space: normal; }
    .round-body { grid-template-columns: 1fr; }
    .detail-log { max-height: 42vh; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Top Bar -->
  <div class="topbar glass">
    <div class="title">AI coding 2.0 干活进度</div>
    <div class="sep"></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">0/0</div>
    </div>
    <div class="sep"></div>
    <div class="meta">
      <span id="iterInfo">Round 0/0</span>
      <span id="elapsedInfo">0s</span>
    </div>
    <button class="refresh-button" id="refreshButton" onclick="refreshNow()">刷新</button>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="stories-panel glass-lg">
      <div class="panel-title">User Stories</div>
      <div class="stories-list" id="storyList"></div>
    </div>
    <div class="logs-panel glass-lg">
      <div class="panel-title">Progress Log</div>
      <div class="logs-content" id="logContent"></div>
    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottombar glass">
    <div class="phase">
      <div class="phase-dot" id="phaseDot" style="background:var(--mac-gray)"></div>
      <div class="phase-text" id="phaseText">等待启动</div>
    </div>
    <div class="clock" id="clock"></div>
  </div>
  <div class="detail-view glass-lg" id="detailView" hidden></div>
</div>

<script>
const POLL_MS = 5 * 60 * 1000;

const PHASE_MAP = {
  idle:       { label: '等待启动',           color: 'var(--mac-gray)',   animate: false },
  developing: { label: 'Developer Agent 工作中', color: 'var(--mac-blue)',   animate: true },
  validating: { label: 'Validator 验证中',    color: 'var(--mac-orange)', animate: true },
  done:       { label: '全部完成',           color: 'var(--mac-green)',  animate: false },
  error:      { label: '出现错误',           color: 'var(--mac-red)',    animate: false },
};

const STATE_CONFIG = {
  active:  { label: '进行中', dotColor: 'var(--mac-blue)',   badgeBg: 'var(--mac-tint)',          badgeColor: 'var(--mac-blue)' },
  working: { label: '工作中', dotColor: 'var(--mac-blue)',   badgeBg: 'var(--mac-tint)',          badgeColor: 'var(--mac-blue)' },
  validating: { label: '验证中', dotColor: 'var(--mac-blue)', badgeBg: 'var(--mac-tint)',          badgeColor: 'var(--mac-blue)' },
  passed:  { label: '已通过', dotColor: 'var(--mac-green)',  badgeBg: 'hsla(142,60%,95%,1)',      badgeColor: 'var(--mac-green)' },
  failed:  { label: '未通过', dotColor: 'var(--mac-red)',    badgeBg: 'hsla(4,80%,96%,1)',        badgeColor: 'var(--mac-red)' },
  blocked: { label: '已阻塞', dotColor: 'var(--mac-orange)', badgeBg: 'hsla(36,80%,95%,1)',      badgeColor: 'var(--mac-orange)' },
  pending: { label: '待执行', dotColor: 'var(--mac-gray)',   badgeBg: 'transparent',              badgeColor: 'var(--muted)' },
};

let useFallback = false;
let dashboardData = null;
let selectedStoryId = null;
let isPolling = false;
const expandedRounds = new Set();
const latestRoundKeys = {};

function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }

function renderInlineMarkdown(s) {
  return esc(s).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
}

function fmtElapsed(s) {
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
}

function getState(story, runtime) {
  const currentStory = typeof runtime === 'string' ? runtime : runtime?.current_story;
  const phase = typeof runtime === 'string' ? null : runtime?.phase;
  if (story.id === currentStory) {
    if (phase === 'developing') return 'working';
    if (phase === 'validating') return 'validating';
    if (typeof runtime === 'string') return 'active';
  }
  if (story.blocked) return 'blocked';
  if (story.passes === true) return 'passed';
  if (story.passes === false && (story.retryCount > 0 || story.notes)) return 'failed';
  return 'pending';
}

function renderStories(stories, runtime) {
  const el = document.getElementById('storyList');
  el.innerHTML = stories.map(s => {
    const st = getState(s, runtime);
    const cfg = STATE_CONFIG[st];
    const isActive = st === 'active' || st === 'working' || st === 'validating';
    return `<div class="story-card ${st} ${isActive ? 'active active-pulse' : ''}" role="button" tabindex="0" onclick="openStoryDetail('${s.id}')" onkeydown="handleStoryKey(event,'${s.id}')">
      <div class="row">
        <div class="dot ${isActive ? 'breathe' : ''}" style="background:${cfg.dotColor}"></div>
        <div class="info">
          <div class="header">
            <span class="id">${s.id}</span>
            <span class="badge" style="background:${cfg.badgeBg};color:${cfg.badgeColor}">${cfg.label}</span>
            ${s.retryCount > 0 ? `<span class="retry">×${s.retryCount}</span>` : ''}
          </div>
          <div class="card-title">${esc(s.title)}</div>
          ${s.notes ? `<div class="notes">${esc(s.notes)}</div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderLogs(logs) {
  const el = document.getElementById('logContent');
  if (!logs.trim()) { el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;font-style:italic">暂无日志</div>'; return; }
  const secs = logs.split(/(?=^## )/m).filter(s => s.trim());
  el.innerHTML = secs.map((sec, i) => {
    const isLatest = i === secs.length - 1;
    const lines = sec.split('\n');
    const header = lines[0].replace(/^## /, '').trim();
    const body = renderInlineMarkdown(lines.slice(1).join('\n').trim());
    return `<div class="log-section ${isLatest ? 'glass-lg' : 'glass'}">
      <div class="log-header ${isLatest ? 'latest' : ''}">${esc(header)}</div>
      <div class="log-body">${body}</div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function renderProgress(stories, runtime) {
  const passed = stories.filter(s => getState(s, runtime) === 'passed').length;
  const total = stories.length;
  document.getElementById('progressFill').style.width = (total ? Math.round(passed/total*100) : 0) + '%';
  document.getElementById('progressLabel').textContent = passed + '/' + total;
}

function renderPhase(rt) {
  const cfg = PHASE_MAP[rt.phase] || PHASE_MAP.idle;
  const dot = document.getElementById('phaseDot');
  const text = document.getElementById('phaseText');
  dot.style.background = cfg.color;
  dot.className = 'phase-dot' + (cfg.animate ? ' breathe' : '');
  let label = cfg.label;
  if (cfg.animate) {
    const storyPart = rt.current_story ? ` · ${rt.current_story}` : '';
    label += storyPart + ` · Round ${rt.iteration}`;
    label += '<span class="loading-dots"></span>';
  }
  text.innerHTML = label;
  document.getElementById('iterInfo').textContent = `Round ${rt.iteration}/${rt.max_iterations}`;
  document.getElementById('elapsedInfo').textContent = fmtElapsed(rt.elapsed);
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN');
}

function handleStoryKey(event, id) {
  if (event.key === 'Enter' || event.key === ' ') {
    event.preventDefault();
    openStoryDetail(id);
  }
}

function roundKey(storyId, round) {
  return storyId + ':' + (round.iterationLabel || round.iteration || 'latest');
}

function getStoryRounds(storyId) {
  const logs = (dashboardData && dashboardData.storyLogs) || {};
  return (logs[storyId] || logs[String(storyId).toUpperCase()] || []).slice();
}

function syncLatestRound(storyId, rounds) {
  if (!rounds.length) return;
  const latest = rounds[rounds.length - 1];
  const key = roundKey(storyId, latest);
  if (latestRoundKeys[storyId] !== key) {
    expandedRounds.add(key);
    latestRoundKeys[storyId] = key;
  }
}

function openStoryDetail(id) {
  if (selectedStoryId !== id) {
    latestRoundKeys[id] = null;
  }
  selectedStoryId = id;
  document.querySelector('.app').classList.add('detail-mode');
  document.getElementById('detailView').hidden = false;
  renderDetail();
}

function backToDashboard() {
  selectedStoryId = null;
  document.querySelector('.app').classList.remove('detail-mode');
  document.getElementById('detailView').hidden = true;
}

function toggleRound(key) {
  if (expandedRounds.has(key)) expandedRounds.delete(key);
  else expandedRounds.add(key);
  renderDetail();
}

function renderLogPane(title, entry) {
  const status = entry && entry.status ? entry.status : 'missing';
  const path = entry && entry.path ? entry.path : status;
  const content = entry && entry.content ? entry.content : ((entry && entry.note) || '日志缺失');
  const isEmpty = !entry || status !== 'ok';
  return `<div class="log-pane">
    <div class="log-pane-head">
      <span>${title}</span>
      <span class="log-path">${esc(path)}</span>
    </div>
    <pre class="detail-log ${isEmpty ? 'empty' : ''}">${esc(content)}</pre>
  </div>`;
}

function renderDetail() {
  const view = document.getElementById('detailView');
  if (!selectedStoryId || !dashboardData) return;

  const story = (dashboardData.stories || []).find(s => s.id === selectedStoryId);
  if (!story) {
    backToDashboard();
    return;
  }

  const rounds = getStoryRounds(story.id);
  syncLatestRound(story.id, rounds);

  const roundsHtml = rounds.length ? rounds.map(round => {
    const key = roundKey(story.id, round);
    const isOpen = expandedRounds.has(key);
    return `<div class="round-card glass">
      <button class="round-toggle" onclick="toggleRound('${key}')">
        <span>Round ${esc(round.iterationLabel || String(round.iteration).padStart(3, '0'))}</span>
        <span class="round-meta">${isOpen ? '收起' : '展开'}</span>
      </button>
      ${isOpen ? `<div class="round-body">
        ${renderLogPane('Developer', round.developer)}
        ${renderLogPane('Validator', round.validator)}
      </div>` : ''}
    </div>`;
  }).join('') : '<div class="empty-detail">暂无可归属运行日志</div>';

  view.innerHTML = `<div class="detail-top">
    <div class="detail-actions">
      <button class="back-button" onclick="backToDashboard()">返回主看板</button>
      <button class="refresh-button" onclick="refreshNow()">刷新</button>
    </div>
    <div class="detail-heading">
      <div class="detail-kicker">${esc(story.id)} · ${esc(STATE_CONFIG[getState(story, dashboardData.runtime)].label)}</div>
      <div class="detail-title">${esc(story.title || story.id)}</div>
    </div>
  </div>
  <div class="rounds">${roundsHtml}</div>`;
}

// ─── Data fetch (works with dashboard.py backend, or uses embedded fallback) ───
const FALLBACK = {
  runtime: { iteration: 12, max_iterations: 50, phase: 'developing', current_story: 'US-003', elapsed: 340 },
  project: '简易笔记系统',
  stories: [

function setRefreshBusy(isBusy) {
  isPolling = isBusy;
  document.querySelectorAll('.refresh-button').forEach(button => {
    button.disabled = isBusy;
    button.textContent = isBusy ? '刷新中' : '刷新';
  });
}

async function poll({ forceFetch = false } = {}) {
  if (isPolling) return;
  setRefreshBusy(true);
  try {
    let data;
    if (forceFetch) useFallback = false;
    if (!useFallback) {
      try {
        const res = await fetch('/api/state?ts=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (e) {
        useFallback = true;
        data = FALLBACK;
      }
    } else {
      data = FALLBACK;
      data.runtime.elapsed++;
    }
    dashboardData = data;
    renderStories(data.stories, data.runtime);
    renderProgress(data.stories, data.runtime);
    renderLogs(data.logs);
    renderPhase(data.runtime);
    if (selectedStoryId) renderDetail();
  } finally {
    setRefreshBusy(false);
  }
}

function refreshNow() {
  poll({ forceFetch: true });
}

setInterval(poll, POLL_MS);
poll();
